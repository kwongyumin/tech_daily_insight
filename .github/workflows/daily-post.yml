name: Daily Tech Post

on:
  schedule:
    - cron: '30 0 * * *'  # 매일 KST 09:30 (UTC 00:30)
  workflow_dispatch:       # 수동 실행 가능

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate daily post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate.py

      - name: Commit and push
        run: |
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"
          git add posts/ .topic-history.json
          if git diff --cached --quiet; then
            echo "변경사항 없음 (오늘 포스팅 이미 존재) - 스킵"
            exit 0
          fi
          git commit -m "feat: Add daily post - $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push failed, retrying ($i/3)..."
            sleep 5
          done
